<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>توجيه إلى أوبسيديان...</title>
    <script>
        function redirectToObsidian() {
            const fullUrl = window.location.href;
            if (!fullUrl.includes('?url=')) {
                document.getElementById('status').innerText = 'الرابط غير موجود.';
                return;
            }

            // استخراج الرابط وفك تشفيره ليفهمه أوبسيديان
            let targetUrl = fullUrl.split('?url=')[1];
            targetUrl = decodeURIComponent(targetUrl);

            if (targetUrl.startsWith('obsidian://')) {
                window.location.href = targetUrl;
            } else {
                document.getElementById('status').innerText = 'الرابط غير صالح.';
            }
        }
        window.onload = redirectToObsidian;
    </script>
</head>
<body style="background-color:#1e1e1e; color:white; text-align:center; padding-top:50px; font-family:sans-serif;">
    <h3 id="status">جاري فتح الملاحظة في أوبسيديان...</h3>
    <p>إذا لم يفتح التطبيق تلقائياً، تأكد من تثبيت أوبسيديان على هذا الجهاز.</p>
</body>
</html>
